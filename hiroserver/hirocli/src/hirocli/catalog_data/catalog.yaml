# Hiro LLM catalog — curated reference data.
# Model *names* follow vendor APIs as of 2026-05 (see developers.openai.com/api/docs/models,
# ai.google.dev/gemini-api/docs/models, platform.claude.com/docs/.../models/overview).
# Pricing is approximate; pricing_source points to vendor API pricing pages (verify before billing).
# tts_voices: preset ids for bundled TTS integrations — verify against vendor docs when upgrading SDKs.
# catalog_version: PEP 440-style string (quote so YAML does not parse as float).
# Pinned to 0.1.3 until the hirocli/app package version is published (bump together then).
catalog_version: "0.1.3"

providers:
  - id: openai
    display_name: OpenAI
    hosting: cloud
    credential_env_keys: [OPENAI_API_KEY]
    docs_url: https://platform.openai.com/docs
    recommended_models:
      chat: openai:gpt-5.5
      tts: openai:gpt-4o-mini-tts
      stt: openai:gpt-4o-transcribe
      embedding: openai:text-embedding-3-small
    # Audio speech API — gpt-4o-mini-tts (instructions); tts-1 / tts-1-hd (character-classic; smaller voice set in docs).
