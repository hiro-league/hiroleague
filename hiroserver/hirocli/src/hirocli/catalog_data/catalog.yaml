# Hiro LLM catalog — curated reference data.
# Model *names* follow vendor APIs as of 2026-03 (see platform.openai.com/docs/models,
# ai.google.dev/gemini-api/docs/models, platform.claude.com/docs/.../models/overview).
# Pricing is approximate; always verify at the vendor pricing page before billing users.
catalog_version: 2

providers:
  - id: openai
    display_name: OpenAI
    hosting: cloud
    credential_env_keys: [OPENAI_API_KEY]
    docs_url: https://platform.openai.com/docs
    recommended_models:
      chat: openai:gpt-5.4
      tts: openai:gpt-4o-mini-tts
      stt: openai:gpt-4o-transcribe
      embedding: openai:text-embedding-3-small
    metadata_updated_at: "2026-03-27"

  - id: google
    display_name: Google (Gemini)
    hosting: cloud
    credential_env_keys: [GOOGLE_API_KEY]
    docs_url: https://ai.google.dev/gemini-api/docs
    recommended_models:
      chat: google:gemini-2.5-flash
      embedding: google:gemini-embedding-001
    metadata_updated_at: "2026-03-27"

  - id: anthropic
    display_name: Anthropic
    hosting: cloud
    credential_env_keys: [ANTHROPIC_API_KEY]
    docs_url: https://platform.claude.com/docs
    recommended_models:
      chat: anthropic:claude-sonnet-4-6
    metadata_updated_at: "2026-03-27"

  - id: ollama
    display_name: Ollama (local)
    hosting: local
    credential_env_keys: []
    default_base_url: http://localhost:11434
    docs_url: https://github.com/ollama/ollama
    recommended_models:
      chat: ollama:llama3.3
      embedding: ollama:nomic-embed-text
    metadata_updated_at: "2026-03-27"

  - id: lm_studio
    display_name: LM Studio (local)
    hosting: local
    credential_env_keys: []
    default_base_url: http://localhost:1234
    docs_url: https://lmstudio.ai/docs
    recommended_models:
      chat: lm_studio:local-model
    metadata_updated_at: "2026-03-27"

  - id: jan
    display_name: Jan (local)
    hosting: local
    credential_env_keys: []
    default_base_url: http://localhost:1337
    docs_url: https://jan.ai/docs
    recommended_models:
      chat: jan:local-model
    metadata_updated_at: "2026-03-27"
    notes: Default port varies by install; check Jan settings.

models:
  # --- OpenAI cloud (frontier chat: platform.openai.com/docs/models) ---
  - id: openai:gpt-5.4
    provider_id: openai
    display_name: GPT-5.4
    model_kind: chat
    model_class: agentic
    context_window: 1000000
    modalities: [text, image_in]
    features: [tools, structured_output, parallel_tools, streaming, json_mode]
    pricing:
      input_per_1m_tokens: 2.50
      output_per_1m_tokens: 15.00
      pricing_updated_at: "2026-03-27"
      pricing_source: platform.openai.com/docs/models

  - id: openai:gpt-5.4-mini
