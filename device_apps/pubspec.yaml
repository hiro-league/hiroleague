name: device_apps
description: "Private Home Box — Flutter client."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^14.6.3

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Local DB
  drift: ">=2.28.1 <2.32.0"
  sqlite3_flutter_libs: ^0.5.29

  # Theming
  flex_color_scheme: ^8.4.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # WebSocket
  web_socket_channel: ^3.0.3

  # Crypto
  cryptography: ^2.7.0

  # QR scanning
  mobile_scanner: ^7.2.0

  # Utils
  uuid: ^4.5.1
  drift_flutter: ^0.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  drift_dev: ">=2.28.1 <2.32.0"

flutter:
  uses-material-design: true
